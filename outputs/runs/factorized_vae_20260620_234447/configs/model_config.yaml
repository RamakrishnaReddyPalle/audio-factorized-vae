  factorvae:
    gamma: 1.0
  orthogonality:
    weight: 0.5
  contrastive:
    temperature: 0.07
    weight: 1.0
  environment:
    weight: 1.0
  kl:
    content: 0.01
    speaker: 0.03
    environment: 0.07
    excitation: 0.04
    fidelity: 0.01
